[global]
    workgroup = CANDYLAND
    server string = Candyland Stables File Store
    security = user
    map to guest = Bad User
    guest account = nobody
    server min protocol = SMB2
    log level = 1

# Anonymous, read-only share - reachable with a null session.
[stables]
    comment = Stable hands - shared docs
    path = /srv/stables
    browseable = yes
    read only = yes
    guest ok = yes
    force user = nobody
